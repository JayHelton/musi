# Supabase CLI config for local development (`supabase start`) and linking.
# Minimal subset — see https://supabase.com/docs/guides/cli/config for all keys.
# The production project itself is provisioned via ../infra/terraform.

project_id = "musi"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["http://localhost:8080", "http://127.0.0.1:8080"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
